[profile.default]
# Project layout
src = "contracts"
out = "out"
libs = ["lib"]
test = "test/solidity"
script = "script"
cache_path = "cache"

# Solidity version & optimizer
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true

# EVM version. Paris is safe for Base/Ethereum/testnets alike in 2026.
evm_version = "paris"

# Fuzzing settings
[fuzz]
runs = 256
max_test_rejects = 65536

[invariant]
runs = 64
depth = 32
call_override = false

# Formatter
[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"
multiline_func_header = "attributes_first"
quote_style = "double"
number_underscore = "thousands"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
