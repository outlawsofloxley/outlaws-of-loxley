<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Diamond-blue base (matches King brawler bg) -->
  <rect width="64" height="64" fill="#3FA5E0"/>
  <!-- Subtle facet pattern -->
  <g fill="#6FCFFF">
    <rect x="0" y="0" width="6" height="6"/>
    <rect x="58" y="0" width="6" height="6"/>
    <rect x="0" y="58" width="6" height="6"/>
    <rect x="58" y="58" width="6" height="6"/>
  </g>
  <!-- Yellow + crosses in corners (signature tier element) -->
  <g fill="#FFD84A">
    <rect x="3" y="2" width="2" height="2"/>
    <rect x="2" y="3" width="2" height="2"/>
    <rect x="4" y="3" width="2" height="2"/>
    <rect x="3" y="4" width="2" height="2"/>

    <rect x="59" y="2" width="2" height="2"/>
    <rect x="58" y="3" width="2" height="2"/>
    <rect x="60" y="3" width="2" height="2"/>
    <rect x="59" y="4" width="2" height="2"/>

    <rect x="3" y="58" width="2" height="2"/>
    <rect x="2" y="59" width="2" height="2"/>
    <rect x="4" y="59" width="2" height="2"/>
    <rect x="3" y="60" width="2" height="2"/>

    <rect x="59" y="58" width="2" height="2"/>
    <rect x="58" y="59" width="2" height="2"/>
    <rect x="60" y="59" width="2" height="2"/>
    <rect x="59" y="60" width="2" height="2"/>
  </g>

  <!-- ─── KING BRAWLER (center, larger) ─────────────────────────── -->
  <!-- Kingsblade (held above the head): white blade with gold cross-guard, ruby pommel -->
  <g fill="#FFFFFF">
    <rect x="30" y="6" width="4" height="2"/>
    <rect x="30" y="8" width="4" height="2"/>
    <rect x="30" y="10" width="4" height="2"/>
    <rect x="30" y="12" width="4" height="2"/>
    <rect x="30" y="14" width="4" height="2"/>
  </g>
  <g fill="#FFD84A"><!-- Cross-guard -->
    <rect x="26" y="16" width="12" height="2"/>
  </g>
  <g fill="#6A1818"><!-- Ruby pommel grip -->
    <rect x="30" y="18" width="4" height="2"/>
  </g>

  <!-- King's crown (above head) -->
  <g fill="#FFD84A">
    <rect x="22" y="20" width="2" height="4"/>
    <rect x="26" y="18" width="2" height="6"/>
    <rect x="30" y="16" width="4" height="8"/>
    <rect x="36" y="18" width="2" height="6"/>
    <rect x="40" y="20" width="2" height="4"/>
    <rect x="22" y="24" width="20" height="2"/>
  </g>
  <g fill="#C13E3E"><!-- Crown jewels -->
    <rect x="30" y="20" width="2" height="2"/>
    <rect x="32" y="20" width="2" height="2"/>
  </g>

  <!-- King's head (peach skin) -->
  <g fill="#E8B088">
    <rect x="24" y="26" width="16" height="10"/>
  </g>
  <!-- King's eyes (white sclera + dark pupil pair, big & royal) -->
  <g fill="#FFFFFF">
    <rect x="26" y="30" width="2" height="2"/>
    <rect x="36" y="30" width="2" height="2"/>
  </g>
  <g fill="#1A1A1A">
    <rect x="28" y="30" width="2" height="2"/>
    <rect x="34" y="30" width="2" height="2"/>
  </g>
  <!-- King's mouth (red, regal) -->
  <g fill="#C13E3E">
    <rect x="30" y="34" width="4" height="2"/>
  </g>

  <!-- King's body (red royal robe) -->
  <g fill="#C13E3E">
    <rect x="22" y="36" width="20" height="16"/>
  </g>
  <g fill="#FFD84A"><!-- Gold trim -->
    <rect x="22" y="36" width="20" height="2"/>
    <rect x="30" y="42" width="4" height="4"/>
  </g>
  <g fill="#7A1818"><!-- Robe shadow -->
    <rect x="22" y="50" width="20" height="2"/>
  </g>

  <!-- King's legs -->
  <g fill="#1A1A1A">
    <rect x="24" y="52" width="6" height="6"/>
    <rect x="34" y="52" width="6" height="6"/>
  </g>

  <!-- ─── LEFT SMALLER BRAWLER (sidekick) ─────────────────────── -->
  <g fill="#E8A070"><!-- Head -->
    <rect x="8" y="32" width="8" height="6"/>
  </g>
  <g fill="#1A1A1A"><!-- Hair on top -->
    <rect x="8" y="30" width="8" height="2"/>
  </g>
  <g fill="#FFFFFF"><rect x="9" y="34" width="2" height="2"/></g>
  <g fill="#1A1A1A"><rect x="13" y="34" width="2" height="2"/></g>
  <g fill="#1A6A3A"><!-- Body (green tunic) -->
    <rect x="8" y="38" width="8" height="10"/>
  </g>
  <g fill="#3A2618"><!-- Legs -->
    <rect x="9" y="48" width="2" height="6"/>
    <rect x="13" y="48" width="2" height="6"/>
  </g>
  <!-- Left sidekick's club/weapon raised on the right -->
  <g fill="#5A3A1A">
    <rect x="16" y="34" width="2" height="6"/>
  </g>
  <g fill="#A0A0A0">
    <rect x="14" y="32" width="6" height="4"/>
  </g>

  <!-- ─── RIGHT SMALLER BRAWLER (sidekick) ─────────────────────── -->
  <g fill="#D4905A"><!-- Head -->
    <rect x="48" y="32" width="8" height="6"/>
  </g>
  <g fill="#5A3A1A"><!-- Bandana on top -->
    <rect x="48" y="30" width="8" height="2"/>
    <rect x="46" y="32" width="2" height="2"/>
  </g>
  <g fill="#FFFFFF"><rect x="49" y="34" width="2" height="2"/></g>
  <g fill="#1A1A1A"><rect x="53" y="34" width="2" height="2"/></g>
  <g fill="#5A2A9A"><!-- Body (purple tunic) -->
    <rect x="48" y="38" width="8" height="10"/>
  </g>
  <g fill="#3A2618"><!-- Legs -->
    <rect x="49" y="48" width="2" height="6"/>
    <rect x="53" y="48" width="2" height="6"/>
  </g>
  <!-- Right sidekick's dagger raised on the left -->
  <g fill="#FFFFFF">
    <rect x="46" y="32" width="2" height="6"/>
  </g>
  <g fill="#FFD84A">
    <rect x="44" y="38" width="6" height="2"/>
  </g>
</svg>
