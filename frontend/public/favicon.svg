<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Diamond-blue base (matches King brawler bg) -->
  <rect width="32" height="32" fill="#3FA5E0"/>
  <!-- Facet highlights -->
  <g fill="#6FCFFF">
    <rect x="0" y="0" width="3" height="3"/>
    <rect x="29" y="0" width="3" height="3"/>
    <rect x="0" y="29" width="3" height="3"/>
    <rect x="29" y="29" width="3" height="3"/>
  </g>
  <!-- King crown (5 spikes + band) - the "BB" identity in mini -->
  <g fill="#FFD84A">
    <!-- Outer spikes -->
    <rect x="4" y="10" width="2" height="4"/>
    <rect x="26" y="10" width="2" height="4"/>
    <!-- Inner spikes -->
    <rect x="9" y="8" width="2" height="6"/>
    <rect x="21" y="8" width="2" height="6"/>
    <!-- Center spike (tallest) -->
    <rect x="14" y="6" width="4" height="8"/>
    <!-- Crown band -->
    <rect x="4" y="14" width="24" height="3"/>
  </g>
  <!-- Crown jewels (red gems centered) -->
  <g fill="#C13E3E">
    <rect x="14" y="9" width="2" height="2"/>
    <rect x="16" y="9" width="2" height="2"/>
    <rect x="9" y="14" width="2" height="2"/>
    <rect x="21" y="14" width="2" height="2"/>
  </g>
  <!-- King's face below the crown (peach skin + dark eyes) -->
  <g fill="#E8B088">
    <rect x="8" y="17" width="16" height="9"/>
  </g>
  <g fill="#FFFFFF">
    <rect x="11" y="20" width="2" height="2"/>
    <rect x="19" y="20" width="2" height="2"/>
  </g>
  <g fill="#1A1A1A">
    <rect x="13" y="20" width="2" height="2"/>
    <rect x="17" y="20" width="2" height="2"/>
  </g>
  <!-- King's mouth (red/regal) -->
  <g fill="#C13E3E">
    <rect x="13" y="24" width="6" height="2"/>
  </g>
</svg>
